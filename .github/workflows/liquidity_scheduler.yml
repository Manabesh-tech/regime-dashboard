name: Liquidity Scheduler

on:
  schedule:
    - cron: "0 * * * *"  # every hour on the hour (UTC)
  workflow_dispatch: {}

jobs:
  run-scheduler-once:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scheduler once
        env:
          # In production you should move DB credentials into GitHub Secrets
          # and read them via environment variables instead of hardcoding.
          PYTHONUNBUFFERED: "1"
        run: |
          python streamlit_app/scheduler.py --mode once
